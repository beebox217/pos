<!doctype html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedPOS - 登入</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D'http%3A//www.w3.org/2000/svg'%20width%3D'64'%20height%3D'64'%20viewBox%3D'0%200%2064%2064'%3E%3Crect%20x%3D'4'%20y%3D'4'%20width%3D'56'%20height%3D'56'%20rx%3D'14'%20fill%3D'%23ffffff'/%3E%3Ctext%20x%3D'32'%20y%3D'39'%20text-anchor%3D'middle'%20font-family%3D'Noto%20Sans%20TC%2C%20sans-serif'%20font-size%3D'24'%20font-weight%3D'900'%20fill%3D'%23000000'%3Ehs%3C/text%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-gray-50 text-gray-900">
    <div class="min-h-screen flex items-center justify-center p-6">
        <div class="w-full max-w-md bg-white border border-gray-200 rounded-3xl shadow-xl overflow-hidden">
            <div class="bg-black text-white p-8">
                <div class="flex items-center gap-3">
                    <div class="bg-white text-black w-10 h-10 rounded-xl font-black flex items-center justify-center select-none overflow-hidden">
                        <img src="./logo.svg" alt="logo" class="w-9 h-9" onerror="this.remove(); this.parentElement.querySelector('[data-fallback]').classList.remove('hidden')">
                        <span data-fallback class="text-[13px] tracking-wide hidden">hs</span>
                    </div>
                    <div>
                        <div class="text-xl font-bold tracking-wider">0423 POS平台</div>
                        <div class="text-xs text-white/70 mt-1">請先登入後開始使用</div>
                    </div>
                </div>
            </div>
            <div class="p-8">
                <div class="flex gap-2 bg-gray-100 p-1 rounded-2xl">
                    <button id="mode-login" class="flex-1 py-2 rounded-xl text-sm font-bold bg-white shadow-sm">登入</button>
                    <button id="mode-register" class="flex-1 py-2 rounded-xl text-sm font-bold text-gray-600 hover:text-gray-900">註冊</button>
                </div>

                <form id="auth-form" class="mt-6 space-y-4">
                    <div>
                        <label for="email" class="block text-sm font-bold text-gray-700 mb-1">Email</label>
                        <input id="email" type="email" autocomplete="email" required
                            class="w-full px-4 py-3 rounded-2xl border border-gray-200 focus:ring-2 focus:ring-gray-900 outline-none transition-all">
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-bold text-gray-700 mb-1">密碼</label>
                        <div class="relative">
                            <input id="password" type="password" autocomplete="current-password" minlength="6" required
                                class="w-full px-4 py-3 pr-12 rounded-2xl border border-gray-200 focus:ring-2 focus:ring-gray-900 outline-none transition-all">
                            <button id="toggle-password" type="button" aria-label="切換顯示密碼"
                                class="absolute right-2 top-1/2 -translate-y-1/2 w-10 h-10 rounded-xl flex items-center justify-center text-gray-500 hover:text-gray-900 hover:bg-gray-100 transition-colors">
                                <svg id="eye-off-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-5 h-5">
                                    <path d="M10.733 5.076A10.744 10.744 0 0 1 12 5c7 0 10 7 10 7a18.99 18.99 0 0 1-2.558 3.967M6.337 6.345A18.99 18.99 0 0 0 2 12s3 7 10 7a10.744 10.744 0 0 0 3.266-.52" />
                                    <path d="M14.12 14.12a3 3 0 0 1-4.24-4.24" />
                                    <path d="M1 1l22 22" />
                                </svg>
                                <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-5 h-5 hidden">
                                    <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                                    <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" />
                                </svg>
                            </button>
                        </div>
                        <div class="text-xs text-gray-500 mt-2">密碼至少 6 碼</div>
                    </div>

                    <label class="flex items-center justify-between gap-3 select-none">
                        <span class="flex items-center gap-2">
                            <input id="remember-me" type="checkbox" class="w-4 h-4 rounded border-gray-300 text-gray-900 focus:ring-gray-900">
                            <span class="text-sm text-gray-700 font-medium">記住我</span>
                        </span>
                    </label>

                    <div id="error-box" class="hidden text-sm bg-gray-50 border border-gray-200 text-gray-900 rounded-2xl p-4"></div>

                    <button id="submit-btn" type="submit"
                        class="w-full bg-black text-white py-4 rounded-2xl font-bold text-lg hover:bg-gray-900 transition-all shadow-lg active:scale-95">
                        登入
                    </button>
                </form>

                <div class="text-xs text-gray-500 mt-6 leading-relaxed">
                    登入後可進入 POS 主畫面並上傳訂單至雲端。
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, setPersistence, browserLocalPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAsUkiZlWWfs0719DB7fY8TqR7grQK6uOc",
            authDomain: "beebox-pos.firebaseapp.com",
            projectId: "beebox-pos",
            storageBucket: "beebox-pos.appspot.com",
            messagingSenderId: "408919901374",
            appId: "1:408919901374:web:119177a33c74a895334aef",
            measurementId: "G-27M2GQTTY0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const modeLoginBtn = document.getElementById('mode-login');
        const modeRegisterBtn = document.getElementById('mode-register');
        const form = document.getElementById('auth-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const rememberMeInput = document.getElementById('remember-me');
        const togglePasswordBtn = document.getElementById('toggle-password');
        const eyeIcon = document.getElementById('eye-icon');
        const eyeOffIcon = document.getElementById('eye-off-icon');
        const submitBtn = document.getElementById('submit-btn');
        const errorBox = document.getElementById('error-box');

        let mode = 'login';

        const setError = (message) => {
            if (!message) {
                errorBox.classList.add('hidden');
                errorBox.innerText = '';
                return;
            }
            errorBox.classList.remove('hidden');
            errorBox.innerText = message;
        };

        const setMode = (nextMode) => {
            mode = nextMode;
            setError('');

            if (mode === 'login') {
                modeLoginBtn.className = "flex-1 py-2 rounded-xl text-sm font-bold bg-white shadow-sm";
                modeRegisterBtn.className = "flex-1 py-2 rounded-xl text-sm font-bold text-gray-600 hover:text-gray-900";
                submitBtn.innerText = "登入";
                passwordInput.autocomplete = "current-password";
            } else {
                modeRegisterBtn.className = "flex-1 py-2 rounded-xl text-sm font-bold bg-white shadow-sm";
                modeLoginBtn.className = "flex-1 py-2 rounded-xl text-sm font-bold text-gray-600 hover:text-gray-900";
                submitBtn.innerText = "建立帳號";
                passwordInput.autocomplete = "new-password";
            }
        };

        modeLoginBtn.addEventListener('click', () => setMode('login'));
        modeRegisterBtn.addEventListener('click', () => setMode('register'));

        const rememberKey = 'pos.rememberMe';
        const savedRemember = localStorage.getItem(rememberKey);
        rememberMeInput.checked = savedRemember !== '0';

        const setPasswordVisibility = (visible) => {
            passwordInput.type = visible ? 'text' : 'password';
            if (visible) {
                eyeIcon.classList.remove('hidden');
                eyeOffIcon.classList.add('hidden');
            } else {
                eyeIcon.classList.add('hidden');
                eyeOffIcon.classList.remove('hidden');
            }
        };

        setPasswordVisibility(false);

        togglePasswordBtn.addEventListener('click', () => {
            setPasswordVisibility(passwordInput.type === 'password');
        });

        onAuthStateChanged(auth, (user) => {
            if (user) window.location.replace('./index.html');
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            setError('');

            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const rememberMe = rememberMeInput.checked;

            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-70');

            try {
                localStorage.setItem(rememberKey, rememberMe ? '1' : '0');
                await setPersistence(auth, rememberMe ? browserLocalPersistence : browserSessionPersistence);
                if (mode === 'login') {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    const cred = await createUserWithEmailAndPassword(auth, email, password);
                    const u = cred?.user ?? null;
                    if (u) {
                        const name = email.split('@')[0] || '使用者';
                        await setDoc(
                            doc(db, 'accounts', u.uid),
                            {
                                name,
                                role: '店員',
                                avatarDataUrl: null,
                                email: u.email ?? email,
                                createdAt: serverTimestamp(),
                                createdBy: u.uid,
                                updatedAt: serverTimestamp(),
                                updatedBy: u.uid
                            },
                            { merge: true }
                        );
                    }
                }
                window.location.replace('./index.html');
            } catch (err) {
                const code = err?.code ?? '';
                const fallback = err?.message ?? '登入失敗，請稍後再試。';
                const map = {
                    'auth/invalid-email': 'Email 格式不正確。',
                    'auth/user-not-found': '找不到此帳號，請先註冊。',
                    'auth/wrong-password': '密碼錯誤。',
                    'auth/invalid-credential': '帳號或密碼錯誤。',
                    'auth/operation-not-allowed': '此 Firebase 專案尚未啟用 Email/Password 登入方式，請到 Firebase Console → Authentication → Sign-in method 啟用。',
                    'auth/configuration-not-found': 'Firebase Authentication 尚未完成啟用或設定，請到 Firebase Console → Authentication 先「開始使用」並啟用 Email/Password。',
                    'auth/email-already-in-use': '此 Email 已被註冊，請直接登入。',
                    'auth/weak-password': '密碼強度不足，請使用至少 6 碼。',
                    'auth/too-many-requests': '嘗試次數過多，請稍後再試。'
                };
                setError(map[code] ?? fallback);
            } finally {
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-70');
            }
        });

        setMode('login');
    </script>
</body>
</html>
