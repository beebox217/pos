
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedPOS - 雲端銷售系統</title>
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D'http%3A//www.w3.org/2000/svg'%20width%3D'64'%20height%3D'64'%20viewBox%3D'0%200%2064%2064'%3E%3Crect%20x%3D'4'%20y%3D'4'%20width%3D'56'%20height%3D'56'%20rx%3D'14'%20fill%3D'%23ffffff'/%3E%3Ctext%20x%3D'32'%20y%3D'39'%20text-anchor%3D'middle'%20font-family%3D'Noto%20Sans%20TC%2C%20sans-serif'%20font-size%3D'24'%20font-weight%3D'900'%20fill%3D'%23000000'%3Ehs%3C/text%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }

    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <div id="app" class="flex flex-col h-screen overflow-hidden">
        <!-- 導航欄 -->
        <header class="bg-black text-white p-4 shadow-md flex justify-between items-center shrink-0">
            <div class="flex items-center space-x-3">
                <div class="bg-white text-black w-9 h-9 rounded-lg font-black flex items-center justify-center select-none overflow-hidden">
                    <img src="./logo.svg" alt="logo" class="w-8 h-8" onerror="this.remove(); this.parentElement.querySelector('[data-fallback]').classList.remove('hidden')">
                    <span data-fallback class="text-[12px] tracking-wide hidden">hs</span>
                </div>
                <h1 class="text-xl font-bold tracking-wider">0423 POS平台</h1>
            </div>
            <div class="flex items-center gap-2">
                <div id="auth-status" class="text-sm md:text-base bg-gray-800 px-4 py-2 rounded-full opacity-90">
                    正在驗證登入...
                </div>
                <button id="settings-btn" class="text-sm md:text-base px-4 py-2 rounded-full border border-white/20 hover:bg-white/10 transition-colors">
                    設置
                </button>
            </div>
        </header>
        <div id="profile-popover" class="hidden fixed top-16 right-2 sm:right-4 z-50 sm:w-[320px] w-[calc(100vw-1rem)] max-w-[calc(100vw-1rem)] bg-white rounded-2xl shadow-2xl border border-gray-200">
            <button id="profile-close-btn" aria-label="關閉" class="absolute right-2 top-2 w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-500 hover:text-gray-900">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
                    <path fill-rule="evenodd" d="M6.72 6.72a.75.75 0 011.06 0L12 10.94l4.22-4.22a.75.75 0 111.06 1.06L13.06 12l4.22 4.22a.75.75 0 11-1.06 1.06L12 13.06l-4.22 4.22a.75.75 0 11-1.06-1.06L10.94 12 6.72 7.78a.75.75 0 010-1.06z" clip-rule="evenodd"/>
                </svg>
            </button>
            <div class="p-4 space-y-4">
                <div class="text-xs text-gray-500">角色名稱</div>
                <div id="profile-role" class="text-sm font-bold text-gray-900">-</div>
                <div class="space-y-2">
                    <div class="text-xs text-gray-500">大頭照</div>
                    <div class="flex items-center gap-4">
                        <div class="w-14 h-14 rounded-full bg-gray-200 text-gray-900 font-black flex items-center justify-center overflow-hidden shrink-0">
                            <img id="profile-avatar-preview" alt="avatar" class="w-full h-full object-cover hidden">
                            <span id="profile-avatar-fallback">?</span>
                        </div>
                        <div class="flex-1">
                            <input id="profile-avatar-file" type="file" accept="image/*" class="block w-full text-sm text-gray-700 file:mr-4 file:py-2 file:px-4 file:rounded-2xl file:border-0 file:bg-gray-100 file:text-gray-900 file:font-bold hover:file:bg-gray-200 transition-colors">
                            <input id="profile-avatar-data" type="hidden">
                            <div class="mt-2">
                                <button id="profile-avatar-remove" type="button" class="px-3 py-2 rounded-2xl font-bold text-xs border border-gray-200 bg-white text-gray-900 hover:bg-gray-50 transition-colors">
                                    移除圖片
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="space-y-2">
                    <div class="text-xs text-gray-500">姓名</div>
                    <input id="profile-name" type="text" class="w-full px-4 py-3 rounded-2xl border border-gray-200 focus:ring-2 focus:ring-gray-900 outline-none transition-all">
                </div>
                <div id="profile-error" class="hidden text-xs bg-gray-50 border border-gray-200 text-gray-900 rounded-2xl p-3"></div>
                <div class="flex items-center justify-end gap-2 pt-1">
                    <button id="profile-save-btn" class="px-4 py-2 rounded-2xl font-bold bg-black text-white hover:bg-gray-900 transition-colors">儲存</button>
                    <button id="profile-logout-btn" class="px-4 py-2 rounded-2xl font-bold border border-gray-200 bg-white text-gray-900 hover:bg-gray-50 transition-colors">登出</button>
                </div>
            </div>
        </div>

        <main class="flex flex-1 overflow-hidden flex-col md:flex-row">
            <!-- 左側：商品選擇 -->
            <div class="flex-1 flex flex-col min-w-0 bg-white">
                <!-- 搜尋與分類 -->
                <div class="p-4 border-b space-y-3">
                    <input type="text" id="search-input" placeholder="搜尋商品名稱..." 
                        class="w-full px-4 py-2 rounded-xl border border-gray-200 focus:ring-2 focus:ring-gray-900 outline-none transition-all">
                    <div id="category-list" class="flex space-x-2 overflow-x-auto pb-1 no-scrollbar">
                        <!-- 分類按鈕動態產生 -->
                    </div>
                </div>

                <!-- 商品列表 -->
                <div id="product-grid" class="flex-1 overflow-y-auto p-4 grid grid-cols-4 grid-rows-3 gap-4 custom-scrollbar">
                    <!-- 商品卡片動態產生 -->
                </div>
            </div>

            <!-- 右側：購物車 -->
            <aside class="w-full md:w-80 lg:w-96 bg-gray-50 border-l border-gray-200 flex flex-col shadow-inner">
                <div class="p-4 bg-white border-b flex justify-between items-center">
                    <h2 class="font-bold text-lg flex items-center">
                        <span class="mr-2">🛒</span> 待結帳清單
                    </h2>
                    <button onclick="clearCart()" class="px-4 py-2 rounded-2xl font-bold border border-gray-200 bg-white text-gray-900 hover:bg-gray-50 transition-colors text-sm">清空</button>
                </div>

                <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar">
                    <!-- 購物車品項動態產生 -->
                </div>

                <!-- 金額結算 -->
                <div class="p-6 bg-white border-t border-gray-200 space-y-3">
                    <div class="flex justify-between text-gray-500 text-sm">
                        <span>小計</span>
                        <span id="subtotal-display">$ 0</span>
                    </div>
                    <div class="flex justify-between text-gray-500 text-sm">
                        <span>服務費 (5%)</span>
                        <span id="tax-display">$ 0</span>
                    </div>
                    <div class="flex justify-between text-2xl font-black text-gray-900 pt-2 border-t">
                        <span>總額</span>
                        <span id="total-display">$ 0</span>
                    </div>
                    <button id="checkout-btn" disabled onclick="handleCheckout()"
                        class="w-full bg-black text-white py-4 rounded-2xl font-bold text-lg hover:bg-gray-900 disabled:bg-gray-300 transition-all shadow-lg active:scale-95 mt-4">
                        確認結帳並上傳雲端
                    </button>
                </div>
            </aside>
        </main>

        <!-- 結帳成功 Modal -->
        <div id="success-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
            <div class="bg-white rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl animate-bounce-short">
                <div class="bg-black p-8 text-white text-center">
                    <div class="text-5xl mb-4">✅</div>
                    <h3 class="text-2xl font-bold">結帳成功！</h3>
                    <p class="opacity-80 text-sm mt-2">訂單資料已同步至 Firebase</p>
                </div>
                <div class="p-6">
                    <div id="receipt-content" class="text-sm space-y-2 text-gray-600 mb-6"></div>
                    <button onclick="closeModal()" class="w-full py-3 bg-gray-800 text-white rounded-xl font-bold hover:bg-black">開始下一筆訂單</button>
                </div>
            </div>
        </div>

        <div id="confirm-modal" class="fixed inset-0 hidden items-center justify-center bg-black/60 backdrop-blur-sm z-[70] p-4">
            <div class="bg-white rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl">
                <div class="bg-black text-white px-6 py-4">
                    <div id="confirm-title" class="font-black">確認動作</div>
                </div>
                <div class="p-6 space-y-4">
                    <div id="confirm-message" class="text-sm text-gray-700">確定要執行嗎？</div>
                    <div class="flex items-center justify-end gap-3">
                        <button id="confirm-cancel-btn" class="px-4 py-3 rounded-2xl font-bold border border-gray-200 bg-white text-gray-900 hover:bg-gray-50 transition-colors">取消</button>
                        <button id="confirm-ok-btn" class="px-5 py-3 rounded-2xl font-bold bg-black text-white hover:bg-gray-900 transition-colors">確認</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="settings-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center z-50">
            <div class="w-full h-full bg-white flex flex-col">
                <div class="shrink-0 bg-black text-white px-6 py-4 flex items-center justify-between">
                    <div class="font-black tracking-wider">設置</div>
                    <button id="settings-close-btn" class="px-3 py-1 rounded-full border border-white/20 hover:bg-white/10 transition-colors text-sm">
                        關閉
                    </button>
                </div>
                <div class="p-6 flex flex-col gap-4 min-h-0">
                    <div id="settings-tabs" class="grid grid-cols-2 sm:grid-cols-11 gap-3 shrink-0">
                        <button data-tab="帳號" class="px-4 py-3 rounded-2xl font-bold border border-gray-200 bg-black text-white">帳號</button>
                        <button data-tab="金流" class="px-4 py-3 rounded-2xl font-bold border border-gray-200 bg-white text-gray-900 hover:bg-gray-50">金流</button>
                        <button data-tab="品牌" class="px-4 py-3 rounded-2xl font-bold border border-gray-200 bg-white text-gray-900 hover:bg-gray-50">品牌</button>
                        <button data-tab="類別" class="px-4 py-3 rounded-2xl font-bold border border-gray-200 bg-white text-gray-900 hover:bg-gray-50">類別</button>
                        <button data-tab="商品" class="px-4 py-3 rounded-2xl font-bold border border-gray-200 bg-white text-gray-900 hover:bg-gray-50">商品</button>
                        <button data-tab="庫存" class="px-4 py-3 rounded-2xl font-bold border border-gray-200 bg-white text-gray-900 hover:bg-gray-50">庫存</button>
                        <button data-tab="進貨" class="px-4 py-3 rounded-2xl font-bold border border-gray-200 bg-white text-gray-900 hover:bg-gray-50">進貨</button>
                        <button data-tab="訂單" class="px-4 py-3 rounded-2xl font-bold border border-gray-200 bg-white text-gray-900 hover:bg-gray-50">訂單</button>
                        <button data-tab="帳務" class="px-4 py-3 rounded-2xl font-bold border border-gray-200 bg-white text-gray-900 hover:bg-gray-50">帳務</button>
                        <button data-tab="折扣" class="px-4 py-3 rounded-2xl font-bold border border-gray-200 bg-white text-gray-900 hover:bg-gray-50">折扣</button>
                        <button data-tab="設定" class="px-4 py-3 rounded-2xl font-bold border border-gray-200 bg-white text-gray-900 hover:bg-gray-50">設定</button>
                    </div>
                    <div class="flex-1 min-h-0 overflow-visible rounded-3xl border border-gray-200 bg-gray-50 p-6">
                        <div id="settings-content-title" class="text-lg font-black text-gray-900 sticky top-0 z-20 bg-gray-50">帳號</div>
                        <div id="settings-content" class="text-sm text-gray-700 mt-2 leading-relaxed">此功能尚未建置。</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="pwa-install-banner" class="hidden fixed bottom-4 right-4 z-[70]">
        <div class="bg-white border border-gray-200 rounded-2xl shadow-2xl p-4 flex items-center gap-3">
            <div class="flex-1">
                <div class="font-bold text-sm text-gray-900">安裝應用程式</div>
                <div class="text-xs text-gray-600 mt-0.5">將 RedPOS 安裝到桌面，獨立視窗使用。</div>
            </div>
            <button id="pwa-install-confirm" class="px-3 py-2 rounded-2xl font-bold bg-black text-white hover:bg-gray-900 transition-colors text-sm">安裝</button>
            <button id="pwa-install-dismiss" class="px-3 py-2 rounded-2xl font-bold border border-gray-200 bg-white text-gray-900 hover:bg-gray-50 transition-colors text-sm">稍後</button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp, getApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, createUserWithEmailAndPassword, setPersistence, inMemoryPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, getDoc, getDocs, addDoc, serverTimestamp, doc, setDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAsUkiZlWWfs0719DB7fY8TqR7grQK6uOc",
            authDomain: "beebox-pos.firebaseapp.com",
            projectId: "beebox-pos",
            storageBucket: "beebox-pos.appspot.com",
            messagingSenderId: "408919901374",
            appId: "1:408919901374:web:119177a33c74a895334aef",
            measurementId: "G-27M2GQTTY0"
        };

        if ('serviceWorker' in navigator) {
            try { navigator.serviceWorker.register('./sw.js'); } catch {}
        }
        let deferredPWAInstallPrompt = null;
        const pwaBannerEl = document.getElementById('pwa-install-banner');
        const pwaInstallBtn = document.getElementById('pwa-install-confirm');
        const pwaDismissBtn = document.getElementById('pwa-install-dismiss');
        const installedFlag = () => localStorage.getItem('pwaInstalled') === '1';
        const dismissedFlag = () => localStorage.getItem('pwaInstallDismissed') === '1';
        const setInstalled = () => localStorage.setItem('pwaInstalled', '1');
        const setDismissed = () => localStorage.setItem('pwaInstallDismissed', '1');
        const isStandalone = () => window.matchMedia && (window.matchMedia('(display-mode: standalone)').matches || window.matchMedia('(display-mode: window-controls-overlay)').matches);
        const shouldShowPwaBanner = () => !isStandalone() && !installedFlag() && !dismissedFlag() && !!deferredPWAInstallPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPWAInstallPrompt = e;
            if (shouldShowPwaBanner()) pwaBannerEl.classList.remove('hidden');
        });
        window.addEventListener('appinstalled', () => {
            setInstalled();
            deferredPWAInstallPrompt = null;
            pwaBannerEl.classList.add('hidden');
        });
        if (pwaInstallBtn) {
            pwaInstallBtn.addEventListener('click', async () => {
                if (!deferredPWAInstallPrompt) return;
                deferredPWAInstallPrompt.prompt();
                const choice = await deferredPWAInstallPrompt.userChoice.catch(() => null);
                deferredPWAInstallPrompt = null;
                if (choice && choice.outcome === 'accepted') {
                    setInstalled();
                    pwaBannerEl.classList.add('hidden');
                } else {
                    setDismissed();
                    pwaBannerEl.classList.add('hidden');
                }
            });
        }
        if (pwaDismissBtn) {
            pwaDismissBtn.addEventListener('click', () => {
                setDismissed();
                pwaBannerEl.classList.add('hidden');
            });
        }
        if (shouldShowPwaBanner()) pwaBannerEl.classList.remove('hidden');

        const setAuthStatus = ({ name, avatarDataUrl }) => {
            const el = document.getElementById('auth-status');
            if (!el) return;

            el.classList.add('flex', 'items-center', 'gap-2');
            el.innerHTML = '';

            const avatarWrap = document.createElement('div');
            avatarWrap.className = 'w-7 h-7 md:w-8 md:h-8 rounded-full bg-gray-700 text-white font-black flex items-center justify-center overflow-hidden shrink-0';

            const initial = String(name ?? '').trim().slice(0, 1).toUpperCase() || '?';
            const fallback = document.createElement('span');
            fallback.innerText = initial;

            if (avatarDataUrl) {
                const img = document.createElement('img');
                img.alt = 'avatar';
                img.src = avatarDataUrl;
                img.className = 'w-full h-full object-cover';
                img.addEventListener('error', () => {
                    img.remove();
                    avatarWrap.appendChild(fallback);
                });
                avatarWrap.appendChild(img);
            } else {
                avatarWrap.appendChild(fallback);
            }

            const textEl = document.createElement('span');
            textEl.className = 'truncate';
            textEl.innerText = `Hi~${String(name ?? '').trim() || '使用者'}`;

            el.appendChild(textEl);
            el.appendChild(avatarWrap);
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let confirmResolver = null;
        let headerAccount = null;
        let profilePopoverOpen = false;

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.replace('./login.html');
                return;
            }
            currentUser = user;
            setAuthStatus({ name: user.email ? user.email.split('@')[0] : `ID:${user.uid.substring(0, 6)}`, avatarDataUrl: null });
            startCategoriesListSync();
            startProductsListSync();
            startBrandsListSync();

            (async () => {
                try {
                    const snap = await getDoc(doc(db, 'accounts', user.uid));
                    if (snap.exists()) {
                        const data = snap.data() ?? {};
                        const displayName = String(data.name ?? '').trim() || (user.email ? user.email.split('@')[0] : '');
                        const avatarDataUrl = String(data.avatarDataUrl ?? '').trim() || null;
                        setAuthStatus({ name: displayName || '使用者', avatarDataUrl });
                        headerAccount = { id: user.uid, ...data };
                        const role = getCurrentRole();
                        if (role === '店員') {
                            settingsBtn.style.display = 'none';
                        } else {
                            settingsBtn.style.display = '';
                        }
                        return;
                    }
                } catch { }

                const fallbackName = user.displayName || (user.email ? user.email.split('@')[0] : `ID:${user.uid.substring(0, 6)}`);
                setAuthStatus({ name: fallbackName || '使用者', avatarDataUrl: user.photoURL || null });
                headerAccount = { id: user.uid, name: fallbackName || '使用者', role: '店員', avatarDataUrl: user.photoURL || null };
                const role = getCurrentRole();
                if (role === '店員') {
                    settingsBtn.style.display = 'none';
                } else {
                    settingsBtn.style.display = '';
                }
            })();
        });

        const doLogout = async () => {
            try {
                await signOut(auth);
            } finally {
                window.location.replace('./login.html');
            }
        };

        const authStatusEl = document.getElementById('auth-status');
        const profilePopover = document.getElementById('profile-popover');
        const profileRoleEl = document.getElementById('profile-role');
        const profileAvatarPreview = document.getElementById('profile-avatar-preview');
        const profileAvatarFallback = document.getElementById('profile-avatar-fallback');
        const profileAvatarFile = document.getElementById('profile-avatar-file');
        const profileAvatarData = document.getElementById('profile-avatar-data');
        const profileAvatarRemove = document.getElementById('profile-avatar-remove');
        const profileNameEl = document.getElementById('profile-name');
        const profileSaveBtn = document.getElementById('profile-save-btn');
        const profileLogoutBtn = document.getElementById('profile-logout-btn');
        const profileErrorEl = document.getElementById('profile-error');
        const profileCloseBtn = document.getElementById('profile-close-btn');

        const setProfileAvatarUI = (dataUrl, fallbackText) => {
            profileAvatarFallback.innerText = (fallbackText || '?').slice(0, 1).toUpperCase();
            if (dataUrl) {
                profileAvatarPreview.src = dataUrl;
                profileAvatarPreview.classList.remove('hidden');
                profileAvatarFallback.classList.add('hidden');
            } else {
                profileAvatarPreview.removeAttribute('src');
                profileAvatarPreview.classList.add('hidden');
                profileAvatarFallback.classList.remove('hidden');
            }
        };

        const resizeImageToDataUrl = async (file) => {
            const maxSize = 256;
            const url = URL.createObjectURL(file);
            try {
                const img = await new Promise((resolve, reject) => {
                    const el = new Image();
                    el.onload = () => resolve(el);
                    el.onerror = () => reject(new Error('讀取圖片失敗'));
                    el.src = url;
                });
                const w = img.naturalWidth || img.width;
                const h = img.naturalHeight || img.height;
                const scale = Math.min(1, maxSize / Math.max(w, h));
                const cw = Math.max(1, Math.round(w * scale));
                const ch = Math.max(1, Math.round(h * scale));
                const canvas = document.createElement('canvas');
                canvas.width = cw;
                canvas.height = ch;
                const ctx = canvas.getContext('2d');
                if (!ctx) throw new Error('瀏覽器不支援圖片處理');
                ctx.drawImage(img, 0, 0, cw, ch);
                try {
                    return canvas.toDataURL('image/webp', 0.85);
                } catch {
                    return canvas.toDataURL('image/jpeg', 0.85);
                }
            } finally {
                URL.revokeObjectURL(url);
            }
        };

        const openProfilePopover = () => {
            if (!currentUser) return;
            const role = headerAccount?.role || '店員';
            const name = headerAccount?.name || '使用者';
            const avatar = headerAccount?.avatarDataUrl || null;
            profileRoleEl.innerText = role;
            profileNameEl.value = name;
            profileAvatarData.value = avatar || '';
            setProfileAvatarUI(profileAvatarData.value, name);
            profileErrorEl.classList.add('hidden');
            profileErrorEl.innerText = '';
            profilePopover.style.display = 'block';
            profilePopover.classList.remove('hidden');
            profilePopoverOpen = true;
        };
        const closeProfilePopover = () => {
            profilePopover.classList.add('hidden');
            profilePopover.style.display = 'none';
            profilePopoverOpen = false;
        };
        const toggleProfilePopover = () => { profilePopoverOpen ? closeProfilePopover() : openProfilePopover(); };

        authStatusEl.addEventListener('click', toggleProfilePopover);
        if (profileCloseBtn) profileCloseBtn.addEventListener('click', closeProfilePopover);
        document.addEventListener('click', (e) => {
            if (!profilePopoverOpen) return;
            if (e.target === authStatusEl || authStatusEl.contains(e.target)) return;

            const chunkSize = 0x8000;

            return btoa(binary);

                    const scale = Math.min(1, maxSize / Math.max(img.naturalWidth || img.width, img.naturalHeight || img.height));

                    const targetH = Math.max(1, Math.round((img.naturalHeight || img.height) * scale));

                    canvas.width = targetW;
                    canvas.height = targetH;

                    if (!ctx) throw new Error('瀏覽器不支援圖片處理');
                    ctx.drawImage(img, 0, 0, targetW, targetH);

                    try {
                        return canvas.toDataURL('image/webp', 0.85);

                    }

                    submitBtn.disabled = true;
                    const prev = submitBtn.innerText;
                    submitBtn.dataset.prevText = prev;
                    submitBtn.innerText = '儲存中...';
                    submitBtn.classList.add('opacity-70');

                    const payload = {
                        name,
                        role,
                        email,
                        phone,
                        avatarDataUrl: avatarDataUrl || null,
                        updatedAt: serverTimestamp()
                    };

                    if (accountEditorMode === 'edit' && editingAccountId) {
                        const original = accountsCache.find(a => a.id === editingAccountId);
                        const originalEmail = String(original?.email ?? '').trim();
                        if (email !== originalEmail) throw new Error('編輯帳號目前不支援修改電子郵件。');
                        if (password) throw new Error('編輯帳號目前不支援修改登入密碼。');
                        await updateDoc(doc(db, 'accounts', editingAccountId), payload);
                    } else {
                        if (!password || password.length < 6) throw new Error('請設定至少 6 碼密碼，才能註冊登入。');

                        let secondaryApp;
                        try {
                            secondaryApp = getApp('secondary-auth');
                        } catch {
                            secondaryApp = initializeApp(firebaseConfig, 'secondary-auth');
                        }
                        const secondaryAuth = getAuth(secondaryApp);
                        await setPersistence(secondaryAuth, inMemoryPersistence);

                        const userCred = await createUserWithEmailAndPassword(secondaryAuth, email, password);
                        const uid = userCred.user.uid;

                        payload.authUid = uid;
                        payload.passwordSetAt = serverTimestamp();
                        payload.createdBy = currentUser?.uid ?? null;

                        await setDoc(doc(db, 'accounts', uid), { ...payload, createdAt: serverTimestamp() });
                        await signOut(secondaryAuth);
                    }

                    closeEditor();
                } catch (err) {
                    const code = err?.code;
                    const map = {
                        'auth/email-already-in-use': '此 Email 已被註冊，請換一個 Email。',
                        'auth/invalid-email': 'Email 格式不正確。',
                        'auth/weak-password': '密碼強度不足，請使用至少 6 碼。',
                        'auth/operation-not-allowed': '此 Firebase 專案尚未啟用 Email/Password 登入方式，請到 Firebase Console → Authentication → Sign-in method 啟用。',
                        'auth/configuration-not-found': 'Firebase Authentication 尚未完成啟用或設定，請到 Firebase Console → Authentication 先「開始使用」並啟用 Email/Password。'
                    };
                    accountEditorError.classList.remove('hidden');
                    accountEditorError.innerText = map[code] ?? (err?.message ?? '儲存失敗，請稍後再試。');
                } finally {
                    // 若視窗尚未關閉（例如出錯），還原按鈕狀態
                    if (submitBtn) {
                        submitBtn.disabled = false;
                        if (submitBtn.dataset.prevText) {
                            submitBtn.innerText = submitBtn.dataset.prevText;
                            delete submitBtn.dataset.prevText;
                        }
                        submitBtn.classList.remove('opacity-70');
                    }
                }
            });

            const renderAccountsRows = () => {
                const roleOrder = { '系統管理員': 0, '店長': 1, '店員': 2 };
                const sorted = [...accountsCache].sort((a, b) => {
                    const ra = roleOrder[String(a.role ?? '').trim()] ?? 3;
                    const rb = roleOrder[String(b.role ?? '').trim()] ?? 3;
                    if (ra !== rb) return ra - rb;
                    const an = String(a.name ?? '').trim();
                    const bn = String(b.name ?? '').trim();
                    return an.localeCompare(bn, 'zh-Hant');
                });
                const rows = sorted.map((a) => {
                    const name = escapeHtml(a.name);
                    const email = escapeHtml(a.email);
                    const phone = escapeHtml(a.phone);
                    const role = escapeHtml(a.role);
                    const avatarDataUrl = a.avatarDataUrl ? escapeHtml(a.avatarDataUrl) : '';
                    const avatarUrl = avatarDataUrl || (a.avatarUrl ? escapeHtml(a.avatarUrl) : '');
                    const initial = escapeHtml((a.name || a.email || '?').trim().slice(0, 1).toUpperCase());
                    const hasPassword = Boolean(a.passwordHash || a.passwordSetAt || a.passwordConfigured);
                    const passwordLabel = hasPassword ? '••••••' : '-';
                    const readonly = Boolean(a._readonly);

                    const avatarHtml = avatarUrl
                        ? `<img src="${avatarUrl}" class="w-9 h-9 rounded-full object-cover" onerror="this.remove(); this.parentElement.querySelector('[data-fallback]').classList.remove('hidden')">`
                        : '';

                    const actionsHtml = readonly
                        ? `<span class="text-gray-500 text-xs">-</span>`
                        : `
                            <div class="flex items-center gap-2">
                                <button data-action="edit" data-id="${a.id}" class="px-3 py-1.5 rounded-xl font-bold text-xs bg-black text-white hover:bg-gray-900 transition-colors">編輯</button>
                                <button data-action="delete" data-id="${a.id}" class="px-3 py-1.5 rounded-xl font-bold text-xs border border-gray-200 bg-white text-gray-900 hover:bg-gray-50 transition-colors">刪除</button>
                            </div>
                        `;

                    return `
                        <tr class="hover:bg-gray-50">
                            <td class="px-4 py-3">
                                <div class="w-9 h-9 rounded-full bg-gray-200 text-gray-900 font-black flex items-center justify-center overflow-hidden">
                                    ${avatarHtml}
                                    <span data-fallback class="${avatarUrl ? 'hidden' : ''}">${initial}</span>
                                </div>
                            </td>
                            <td class="px-4 py-3 font-bold text-gray-900">${name}</td>
                            <td class="px-4 py-3 text-gray-700">${email}</td>
                            <td class="px-4 py-3 text-gray-700">${phone || '-'}</td>
                            <td class="px-4 py-3">
                                <span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-bold bg-gray-100 text-gray-900 border border-gray-200">${role || '-'}</span>
                            </td>
                            <td class="px-4 py-3 font-mono text-gray-700">${passwordLabel}</td>
                            <td class="px-4 py-3">
                                ${actionsHtml}
                            </td>
                        </tr>
                    `;
                }).join('');

                tbody.innerHTML = rows || `
                    <tr>
                        <td colspan="7" class="px-4 py-10 text-center text-gray-500">尚無帳號資料，請先新增。</td>
                    </tr>
                `;
            };

            renderAccountsRows();

            if (!accountsUnsub) {
                accountsUnsub = onSnapshot(
                    collection(db, 'accounts'),
                    async (snapshot) => {
                        accountsPermissionDenied = false;
                        noticeEl.classList.add('hidden');
                        noticeEl.innerText = '';
                        addBtn.disabled = false;
                        addBtn.className = 'px-4 py-2 rounded-2xl font-bold bg-black text-white hover:bg-gray-900 transition-colors';
                        accountsCache = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));

                        if (accountsCache.length === 0 && currentUser?.uid && currentUser?.email && !seededDefaultAccount) {
                            seededDefaultAccount = true;
                            const emailPrefix = String(currentUser.email).split('@')[0] || '使用者';
                            const payload = {
                                name: currentUser.displayName ?? emailPrefix,
                                role: '系統管理員',
                                email: currentUser.email,
                                phone: '',
                                avatarUrl: currentUser.photoURL ?? null,
                                authUid: currentUser.uid,
                                createdAt: serverTimestamp(),
                                updatedAt: serverTimestamp()
                            };

                            accountsCache = [{ id: currentUser.uid, ...payload }];
                            renderAccountsRows();

                            try {
                                await setDoc(doc(db, 'accounts', currentUser.uid), payload, { merge: true });
                            } catch (err) {
                                seededDefaultAccount = false;
                            }
                        }

                        renderAccountsRows();
                    },
                    (error) => {
                        if (error?.code === 'permission-denied') {
                            accountsPermissionDenied = true;
                            addBtn.disabled = true;
                            addBtn.className = 'px-4 py-2 rounded-2xl font-bold bg-gray-300 text-gray-700 cursor-not-allowed';
                            noticeEl.classList.remove('hidden');
                            noticeEl.innerText = '目前帳號資料權限不足，已先改為僅顯示目前登入者；如需完整帳號管理（新增/編輯/刪除），請到 Firebase Console 調整 Firestore Rules 允許登入者讀寫 accounts。';
                            const emailPrefix = String(currentUser?.email ?? '').split('@')[0] || '使用者';
                            accountsCache = [{
                                id: currentUser?.uid ?? 'current-user',
                                name: currentUser?.displayName ?? emailPrefix,
                                role: '系統管理員',
                                email: currentUser?.email ?? '',
                                phone: '',
                                avatarUrl: currentUser?.photoURL ?? null,
                                authUid: currentUser?.uid ?? null,
                                passwordHash: null,
                                _readonly: true
                            }];
                            renderAccountsRows();
                            return;
                        }

                        accountsCache = [];
                        noticeEl.classList.remove('hidden');
                        noticeEl.innerText = `無法讀取帳號資料：${escapeHtml(error?.code ?? error?.message ?? 'unknown error')}`;
                        renderAccountsRows();
                    }
                );
            }
        };

        const unmountAccountsTab = () => {
            if (accountsUnsub) {
                accountsUnsub();
                accountsUnsub = null;
            }
        };

        const unmountCategoriesTab = () => {
            if (categoriesUnsub) {
                categoriesUnsub();
                categoriesUnsub = null;
            }
        };

        const setSettingsTab = (tab) => {
            if (!isTabAllowedForRole(tab)) {
                const allowed = getAllowedTabsForRole();
                const fallback = allowed[0];
                if (!fallback) return;
                tab = fallback;
            }
            const buttons = settingsTabsEl.querySelectorAll('button[data-tab]');
            buttons.forEach((btn) => {
                const active = btn.getAttribute('data-tab') === tab;
                btn.className = active
                    ? 'px-4 py-3 rounded-2xl font-bold border border-gray-200 bg-black text-white'
                    : 'px-4 py-3 rounded-2xl font-bold border border-gray-200 bg-white text-gray-900 hover:bg-gray-50';
            });
            settingsContentTitleEl.innerText = tab;
            if (tab === '帳號') {
                unmountCategoriesTab();
                if (brandsUnsub) { brandsUnsub(); brandsUnsub = null; }
                renderAccountsTab();
                return;
            }
            if (tab === '商品') {
                unmountAccountsTab();
                unmountCategoriesTab();
                if (brandsUnsub) { brandsUnsub(); brandsUnsub = null; }
                renderProductsTab();
                return;
            }
            if (tab === '類別') {
                unmountAccountsTab();
                if (brandsUnsub) { brandsUnsub(); brandsUnsub = null; }
                renderCategoriesTab();
                return;
            }
            if (tab === '庫存') {
                unmountAccountsTab();
                if (brandsUnsub) { brandsUnsub(); brandsUnsub = null; }
                renderInventoryTab();
                return;
            }
            if (tab === '進貨') {
                unmountAccountsTab();
                unmountCategoriesTab();
                if (brandsUnsub) { brandsUnsub(); brandsUnsub = null; }
                renderPurchasesTab();
                return;
            }
            if (tab === '品牌') {
                unmountAccountsTab();
                renderBrandsTab();
                return;
            }
            unmountAccountsTab();
            unmountCategoriesTab();
            if (brandsUnsub) { brandsUnsub(); brandsUnsub = null; }
            renderPlaceholder(tab);
        };

        settingsBtn.addEventListener('click', openSettingsModal);
        settingsCloseBtn.addEventListener('click', closeSettingsModal);
        settingsModal.addEventListener('click', (e) => {
            if (e.target === settingsModal) closeSettingsModal();
        });
        settingsTabsEl.addEventListener('click', (e) => {
            const btn = e.target.closest('button[data-tab]');
            if (!btn) return;
            setSettingsTab(btn.getAttribute('data-tab'));
        });
        document.addEventListener('keydown', (e) => {
            if (e.key !== 'Escape') return;
            if (confirmModalEl.style.display === 'flex') {
                closeConfirm(false);
                return;
            }
            if (settingsModal.style.display === 'flex') closeSettingsModal();
        });

        // 3. 資料與狀態管理
        const PRODUCTS = [];

        function startProductsListSync() {
            if (productsListUnsub) return;
            productsListUnsub = onSnapshot(
                collection(db, 'products'),
                (snapshot) => {
                    const list = snapshot.docs.map((d) => {
                        const data = d.data() ?? {};
                        const fid = String(d.id);
                        const id = Number.isFinite(Number(fid)) ? Number(fid) : (Number(data.id) || fid);
                        return {
                            id,
                            name: String(data.name ?? ''),
                            category: String(data.category ?? ''),
                            brand: String(data.brand ?? '-') || '-',
                            price: Number(data.price ?? 0),
                            costPrice: data.costPrice != null ? Number(data.costPrice) : null,
                            emoji: String(data.emoji ?? ''),
                            bgColor: String(data.bgColor ?? '#f3f4f6') || '#f3f4f6',
                            imageUrl: data.imageUrl ?? null,
                            imageDataUrl: data.imageDataUrl ?? null
                        };
                    }).sort((a, b) => (Number(a.id) || 0) - (Number(b.id) || 0));
                    PRODUCTS.length = 0;
                    Array.prototype.push.apply(PRODUCTS, list);
                    if (typeof renderCategories === 'function') renderCategories();
                    if (typeof renderProducts === 'function') renderProducts();
                    if (typeof renderInventory === 'function') renderInventory();
                },
                () => { }
            );
        }

        let cart = [];
        let currentCategory = '全部';
        let searchQuery = '';

        // 4. 渲染函式
        function renderCategories() {
            const container = document.getElementById('category-list');
            if (!container) return;

            const productCats = PRODUCTS.map(p => String(p.category ?? '').trim()).filter(Boolean);
            const dbCats = categoriesCache.map(c => String(c?.name ?? '').trim()).filter(Boolean);
            const cats = [
                '全部',
                ...Array.from(new Set([...dbCats, ...productCats])).sort((a, b) => a.localeCompare(b, 'zh-Hant'))
            ];

            if (!container.dataset.bound) {
                container.dataset.bound = '1';
                container.addEventListener('click', (e) => {
                    const btn = e.target.closest('button[data-cat]');
                    if (!btn) return;
                    window.setCategory(btn.getAttribute('data-cat'));
                });
            }

            container.innerHTML = cats.map((cat) => {
                const active = currentCategory === cat;
                return `
                    <button data-cat="${escapeHtml(cat)}"
                        class="px-5 py-2.5 rounded-full text-base font-bold transition-all whitespace-nowrap
                        ${active ? 'bg-black text-white shadow-md' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}">
                        ${escapeHtml(cat)}
                    </button>
                `;
            }).join('');
        }

        function renderProducts() {
            const container = document.getElementById('product-grid');
            const filtered = PRODUCTS.filter(p => {
                const matchCat = currentCategory === '全部' || p.category === currentCategory;
                const matchSearch = p.name.includes(searchQuery);
                return matchCat && matchSearch;
            });

            container.innerHTML = filtered.map(p => {
                const name = String(p.name ?? '');
                const brandName = String(p.brand ?? '').trim();
                const brandDoc = brandsCache.find(b => String(b.name ?? '').trim() === brandName);
                const brandLogo = brandDoc?.logoDataUrl || null;
                const imageUrl = p.imageDataUrl || p.imageUrl || null;
                const imgMain = imageUrl
                    ? `<img src="${escapeHtml(imageUrl)}" alt="${escapeHtml(name)}" class="w-20 h-20 object-cover rounded-2xl">`
                    : (brandLogo ? `<img src="${escapeHtml(brandLogo)}" alt="${escapeHtml(brandName || name)}" class="w-16 h-16 object-cover rounded-2xl">` : `<div class="w-20 aspect-square rounded-2xl bg-gray-100"></div>`);
                const brandBadge = brandLogo
                    ? `<img src="${escapeHtml(brandLogo)}" alt="${escapeHtml(brandName)}" class="absolute top-2 left-2 w-6 h-6 rounded-full object-cover border border-white shadow-sm">`
                    : '';
                return `
                <div onclick="addToCart(${p.id})" class="relative bg-white p-4 rounded-2xl border border-gray-100 shadow-sm hover:border-gray-300 hover:shadow-md cursor-pointer transition-all active:scale-95 flex flex-col items-center text-center group">
                    ${brandBadge}
                    <span class="w-20 aspect-square flex items-center justify-center mb-2 group-hover:scale-110 transition-transform">${imgMain}</span>
                    <span class="font-bold text-sm overflow-hidden line-clamp-2 leading-normal pb-0.5 min-h-[1.8rem]">${escapeHtml(name)}</span>
                    <span class="text-gray-900 font-black -mt-1 text-xl">$ ${escapeHtml(p.price)}</span>
                </div>`;
            }).join('');
        }

        let inventoryBrandFilter = '全部';
        function renderInventory() {
            const tbody = document.getElementById('inventory-tbody');
            if (!tbody) return;
            if (!Array.isArray(PRODUCTS) || PRODUCTS.length === 0) {
                tbody.innerHTML = `
                    <tr class="hover:bg-white">
                        <td class="px-4 py-6 text-gray-600" colspan="3">目前沒有商品。</td>
                    </tr>
                `;
                return;
            }
            const source = PRODUCTS.filter((p) => {
                const b = String(p.brand ?? '').trim();
                if (!inventoryBrandFilter || inventoryBrandFilter === '全部') return true;
                return b === inventoryBrandFilter;
            });
            const rows = source.map((p) => {
                const name = String(p.name ?? '');
                const rawBrand = String(p.brand ?? '').trim();
                const brandDoc = brandsCache.find(b => String(b.name ?? '').trim() === rawBrand);
                const brandLogo = brandDoc?.logoDataUrl ? escapeHtml(brandDoc.logoDataUrl) : '';
                const brandCell = `
                    <div class="flex items-center gap-2">
                        ${brandLogo ? `<img src="${brandLogo}" alt="${escapeHtml(rawBrand)}" class="w-5 h-5 rounded-full object-cover border border-gray-200">` : `<span class="inline-flex w-5 h-5 rounded-full bg-gray-200 text-[10px] items-center justify-center">${(rawBrand || '-').slice(0,1).toUpperCase()}</span>`}
                        <span class="text-gray-900 font-bold">${escapeHtml(rawBrand || '-')}</span>
                    </div>
                `;
                const imageUrl = p.imageDataUrl || p.imageUrl || '';
                const stock = Number.isFinite(Number(p.stock)) ? Number(p.stock) : 0;
                const thumb = imageUrl
                    ? `<img src="${escapeHtml(imageUrl)}" alt="${escapeHtml(name)}" class="w-10 h-10 object-cover rounded-2xl">`
                    : `<div class="w-10 h-10 rounded-2xl bg-gray-100"></div>`;
                return `
                    <tr class="hover:bg-gray-50">
                        <td class="px-4 py-3">${brandCell}</td>
                        <td class="px-4 py-3">
                            <div class="flex items-center gap-3">
                                <div class="shrink-0">${thumb}</div>
                                <div class="font-bold text-gray-900 truncate max-w-[240px]">${escapeHtml(name)}</div>
                            </div>
                        </td>
                        <td class="px-4 py-3 text-gray-900 font-bold">${escapeHtml(stock)}</td>
                    </tr>
                `;
            }).join('');
            tbody.innerHTML = rows;
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-gray-300 space-y-2 py-10">
                        <span class="text-6xl">🛒</span>
                        <p>購物車空空的</p>
                    </div>
                `;
                document.getElementById('checkout-btn').disabled = true;
            } else {
                container.innerHTML = cart.map(item => {
                    const name = String(item.name ?? '');
                    const brandName = String(item.brand ?? '').trim();
                    const brandDoc = brandsCache.find(b => String(b.name ?? '').trim() === brandName);
                    const brandLogo = brandDoc?.logoDataUrl || null;
                    const imageUrl = item.imageDataUrl || item.imageUrl || null;
                    const thumb = imageUrl
                        ? `<img src="${escapeHtml(imageUrl)}" alt="${escapeHtml(name)}" class="w-12 h-12 object-cover rounded-xl">`
                        : (brandLogo ? `<img src="${escapeHtml(brandLogo)}" alt="${escapeHtml(brandName || name)}" class="w-10 h-10 object-cover rounded-xl">` : `<div class="w-12 h-12 rounded-xl bg-gray-100"></div>`);
                    return `
                    <div class="flex items-center justify-between bg-white p-3 rounded-xl shadow-sm border border-gray-50">
                        <div class="flex items-center gap-3 min-w-0">
                            <div class="shrink-0">${thumb}</div>
                            <div class="flex-1 min-w-0">
                                <div class="font-bold text-sm truncate">${escapeHtml(name)}</div>
                                <div class="text-gray-900 text-xs font-bold">$ ${escapeHtml(item.price)}</div>
                            </div>
                        </div>
                        <div class="flex items-center space-x-2">
                            <button onclick="updateQty(${item.id}, -1)" class="w-7 h-7 flex items-center justify-center bg-gray-100 rounded-lg hover:bg-gray-200 hover:text-gray-900 font-bold">-</button>
                            <span class="w-6 text-center text-sm font-bold">${item.quantity}</span>
                            <button onclick="updateQty(${item.id}, 1)" class="w-7 h-7 flex items-center justify-center bg-gray-100 rounded-lg hover:bg-gray-200 hover:text-gray-900 font-bold">+</button>
                        </div>
                    </div>
                    `;
                }).join('');
                document.getElementById('checkout-btn').disabled = false;
            }

            const subtotal = cart.reduce((s, i) => s + i.price * i.quantity, 0);
            const tax = Math.round(subtotal * 0.05);
            const total = subtotal + tax;

            document.getElementById('subtotal-display').innerText = `$ ${subtotal}`;
            document.getElementById('tax-display').innerText = `$ ${tax}`;
            document.getElementById('total-display').innerText = `$ ${total}`;
            return { subtotal, tax, total };
        }

        // 5. 互動邏輯 (掛載到 window 供 HTML 呼叫)
        window.setCategory = (cat) => { currentCategory = cat; renderCategories(); renderProducts(); };
        window.addToCart = (id) => {
            const p = PRODUCTS.find(x => x.id === id);
            const exist = cart.find(x => x.id === id);
            if (exist) exist.quantity++;
            else cart.push({ ...p, quantity: 1 });
            renderCart();
        };
        window.updateQty = (id, delta) => {
            const item = cart.find(x => x.id === id);
            item.quantity += delta;
            if (item.quantity <= 0) cart = cart.filter(x => x.id !== id);
            renderCart();
        };
        window.clearCart = () => { cart = []; renderCart(); };

        window.handleCheckout = async () => {
            if (!currentUser) {
                alert("尚未登入，請先登入。");
                return;
            }

            const { subtotal, tax, total } = renderCart();
            const btn = document.getElementById('checkout-btn');
            btn.innerText = "正在儲存至雲端...";
            btn.disabled = true;

            try {
                const orderData = {
                    items: cart.map(i => ({ name: i.name, price: i.price, qty: i.quantity })),
                    subtotal,
                    tax,
                    total,
                    createdAt: serverTimestamp(),
                    userId: currentUser.uid,
                    userEmail: currentUser.email ?? null
                };

                await addDoc(collection(db, 'orders'), orderData);

                // 顯示成功 Modal
                const receiptHtml = cart.map(i => `
                    <div class="flex justify-between">
                        <span>${i.name} x ${i.quantity}</span>
                        <span>$ ${i.price * i.quantity}</span>
                    </div>
                `).join('') + `<div class="receipt-dashed mt-2 pt-2 flex justify-between font-bold text-gray-900"><span>實收</span><span>$ ${total}</span></div>`;
                
                document.getElementById('receipt-content').innerHTML = receiptHtml;
                document.getElementById('success-modal').style.display = 'flex';
                
            } catch (err) {
                console.error("儲存失敗", err);
                alert("雲端儲存失敗，請檢查網路連線。");
            } finally {
                btn.innerText = "確認結帳並上傳雲端";
                btn.disabled = false;
            }
        };

        window.closeModal = () => {
            document.getElementById('success-modal').style.display = 'none';
            window.clearCart();
        };

        document.getElementById('search-input').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderProducts();
        });

        // 初始化渲染
        renderCategories();
        renderProducts();
        renderCart();

    </script>
</body>
</html>
