
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedPOS - 雲端銷售系統</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D'http%3A//www.w3.org/2000/svg'%20width%3D'64'%20height%3D'64'%20viewBox%3D'0%200%2064%2064'%3E%3Crect%20x%3D'4'%20y%3D'4'%20width%3D'56'%20height%3D'56'%20rx%3D'14'%20fill%3D'%23ffffff'/%3E%3Ctext%20x%3D'32'%20y%3D'39'%20text-anchor%3D'middle'%20font-family%3D'Noto%20Sans%20TC%2C%20sans-serif'%20font-size%3D'24'%20font-weight%3D'900'%20fill%3D'%23000000'%3Ehs%3C/text%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        .receipt-dashed { border-top: 2px dashed #e5e7eb; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <div id="app" class="flex flex-col h-screen overflow-hidden">
        <!-- 導航欄 -->
        <header class="bg-black text-white p-4 shadow-md flex justify-between items-center shrink-0">
            <div class="flex items-center space-x-3">
                <div class="bg-white text-black w-9 h-9 rounded-lg font-black flex items-center justify-center select-none overflow-hidden">
                    <img src="./logo.svg" alt="logo" class="w-8 h-8" onerror="this.remove(); this.parentElement.querySelector('[data-fallback]').classList.remove('hidden')">
                    <span data-fallback class="text-[12px] tracking-wide hidden">hs</span>
                </div>
                <h1 class="text-xl font-bold tracking-wider">0423 POS平台</h1>
            </div>
            <div class="flex items-center gap-2">
                <button id="settings-btn" class="text-xs px-3 py-1 rounded-full border border-white/20 hover:bg-white/10 transition-colors">
                    設置
                </button>
                <div id="auth-status" class="text-xs bg-gray-800 px-3 py-1 rounded-full opacity-90">
                    正在驗證登入...
                </div>
                <button id="logout-btn" class="text-xs px-3 py-1 rounded-full border border-white/20 hover:bg-white/10 transition-colors">
                    登出
                </button>
            </div>
        </header>

        <main class="flex flex-1 overflow-hidden flex-col md:flex-row">
            <!-- 左側：商品選擇 -->
            <div class="flex-1 flex flex-col min-w-0 bg-white">
                <!-- 搜尋與分類 -->
                <div class="p-4 border-b space-y-3">
                    <input type="text" id="search-input" placeholder="搜尋商品名稱..." 
                        class="w-full px-4 py-2 rounded-xl border border-gray-200 focus:ring-2 focus:ring-gray-900 outline-none transition-all">
                    <div id="category-list" class="flex space-x-2 overflow-x-auto pb-1 no-scrollbar">
                        <!-- 分類按鈕動態產生 -->
                    </div>
                </div>

                <!-- 商品列表 -->
                <div id="product-grid" class="flex-1 overflow-y-auto p-4 grid grid-cols-4 grid-rows-3 gap-4 custom-scrollbar">
                    <!-- 商品卡片動態產生 -->
                </div>
            </div>

            <!-- 右側：購物車 -->
            <aside class="w-full md:w-80 lg:w-96 bg-gray-50 border-l border-gray-200 flex flex-col shadow-inner">
                <div class="p-4 bg-white border-b flex justify-between items-center">
                    <h2 class="font-bold text-lg flex items-center">
                        <span class="mr-2">🛒</span> 待結帳清單
                    </h2>
                    <button onclick="clearCart()" class="px-4 py-2 rounded-2xl font-bold border border-gray-200 bg-white text-gray-900 hover:bg-gray-50 transition-colors text-sm">清空</button>
                </div>

                <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar">
                    <!-- 購物車品項動態產生 -->
                </div>

                <!-- 金額結算 -->
                <div class="p-6 bg-white border-t border-gray-200 space-y-3">
                    <div class="flex justify-between text-gray-500 text-sm">
                        <span>小計</span>
                        <span id="subtotal-display">$ 0</span>
                    </div>
                    <div class="flex justify-between text-gray-500 text-sm">
                        <span>服務費 (5%)</span>
                        <span id="tax-display">$ 0</span>
                    </div>
                    <div class="flex justify-between text-2xl font-black text-gray-900 pt-2 border-t">
                        <span>總額</span>
                        <span id="total-display">$ 0</span>
                    </div>
                    <button id="checkout-btn" disabled onclick="handleCheckout()"
                        class="w-full bg-black text-white py-4 rounded-2xl font-bold text-lg hover:bg-gray-900 disabled:bg-gray-300 transition-all shadow-lg active:scale-95 mt-4">
                        確認結帳並上傳雲端
                    </button>
                </div>
            </aside>
        </main>

        <!-- 結帳成功 Modal -->
        <div id="success-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
            <div class="bg-white rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl animate-bounce-short">
                <div class="bg-black p-8 text-white text-center">
                    <div class="text-5xl mb-4">✅</div>
                    <h3 class="text-2xl font-bold">結帳成功！</h3>
                    <p class="opacity-80 text-sm mt-2">訂單資料已同步至 Firebase</p>
                </div>
                <div class="p-6">
                    <div id="receipt-content" class="text-sm space-y-2 text-gray-600 mb-6"></div>
                    <button onclick="closeModal()" class="w-full py-3 bg-gray-800 text-white rounded-xl font-bold hover:bg-black">開始下一筆訂單</button>
                </div>
            </div>
        </div>

        <div id="confirm-modal" class="fixed inset-0 hidden items-center justify-center bg-black/60 backdrop-blur-sm z-[70] p-4">
            <div class="bg-white rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl">
                <div class="bg-black text-white px-6 py-4">
                    <div id="confirm-title" class="font-black">確認動作</div>
                </div>
                <div class="p-6 space-y-4">
                    <div id="confirm-message" class="text-sm text-gray-700">確定要執行嗎？</div>
                    <div class="flex items-center justify-end gap-3">
                        <button id="confirm-cancel-btn" class="px-4 py-3 rounded-2xl font-bold border border-gray-200 bg-white text-gray-900 hover:bg-gray-50 transition-colors">取消</button>
                        <button id="confirm-ok-btn" class="px-5 py-3 rounded-2xl font-bold bg-black text-white hover:bg-gray-900 transition-colors">確認</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="settings-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center z-50">
            <div class="w-full h-full bg-white flex flex-col">
                <div class="shrink-0 bg-black text-white px-6 py-4 flex items-center justify-between">
                    <div class="font-black tracking-wider">設置</div>
                    <button id="settings-close-btn" class="px-3 py-1 rounded-full border border-white/20 hover:bg-white/10 transition-colors text-sm">
                        關閉
                    </button>
                </div>
                <div class="p-6 flex flex-col gap-4 min-h-0">
                    <div id="settings-tabs" class="grid grid-cols-2 sm:grid-cols-9 gap-3 shrink-0">
                        <button data-tab="帳號" class="px-4 py-3 rounded-2xl font-bold border border-gray-200 bg-black text-white">帳號</button>
                        <button data-tab="金流" class="px-4 py-3 rounded-2xl font-bold border border-gray-200 bg-white text-gray-900 hover:bg-gray-50">金流</button>
                        <button data-tab="品牌" class="px-4 py-3 rounded-2xl font-bold border border-gray-200 bg-white text-gray-900 hover:bg-gray-50">品牌</button>
                        <button data-tab="類別" class="px-4 py-3 rounded-2xl font-bold border border-gray-200 bg-white text-gray-900 hover:bg-gray-50">類別</button>
                        <button data-tab="商品" class="px-4 py-3 rounded-2xl font-bold border border-gray-200 bg-white text-gray-900 hover:bg-gray-50">商品</button>
                        <button data-tab="庫存" class="px-4 py-3 rounded-2xl font-bold border border-gray-200 bg-white text-gray-900 hover:bg-gray-50">庫存</button>
                        <button data-tab="報表" class="px-4 py-3 rounded-2xl font-bold border border-gray-200 bg-white text-gray-900 hover:bg-gray-50">報表</button>
                        <button data-tab="折扣" class="px-4 py-3 rounded-2xl font-bold border border-gray-200 bg-white text-gray-900 hover:bg-gray-50">折扣</button>
                        <button data-tab="設定" class="px-4 py-3 rounded-2xl font-bold border border-gray-200 bg-white text-gray-900 hover:bg-gray-50">設定</button>
                    </div>
                    <div class="flex-1 min-h-0 overflow-auto rounded-3xl border border-gray-200 bg-gray-50 p-6">
                        <div id="settings-content-title" class="text-lg font-black text-gray-900 sticky top-0 z-20 bg-gray-50">帳號</div>
                        <div id="settings-content" class="text-sm text-gray-700 mt-2 leading-relaxed">此功能尚未建置。</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp, getApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, createUserWithEmailAndPassword, setPersistence, inMemoryPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp, doc, setDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAsUkiZlWWfs0719DB7fY8TqR7grQK6uOc",
            authDomain: "beebox-pos.firebaseapp.com",
            projectId: "beebox-pos",
            storageBucket: "beebox-pos.firebasestorage.app",
            messagingSenderId: "408919901374",
            appId: "1:408919901374:web:119177a33c74a895334aef",
            measurementId: "G-27M2GQTTY0"
        };

        const setAuthStatus = (text) => {
            const el = document.getElementById('auth-status');
            if (el) el.innerText = text;
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let confirmResolver = null;

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.replace('./login.html');
                return;
            }
            currentUser = user;
            const label = user.email ? user.email : `ID: ${user.uid.substring(0, 6)}`;
            setAuthStatus(`已登入 (${label})`);
        });

        document.getElementById('logout-btn').addEventListener('click', async () => {
            try {
                await signOut(auth);
            } finally {
                window.location.replace('./login.html');
            }
        });

        const settingsModal = document.getElementById('settings-modal');
        const settingsBtn = document.getElementById('settings-btn');
        const settingsCloseBtn = document.getElementById('settings-close-btn');
        const settingsTabsEl = document.getElementById('settings-tabs');
        const settingsContentTitleEl = document.getElementById('settings-content-title');
        const settingsContentEl = document.getElementById('settings-content');
        const confirmModalEl = document.getElementById('confirm-modal');
        const confirmTitleEl = document.getElementById('confirm-title');
        const confirmMessageEl = document.getElementById('confirm-message');
        const confirmCancelBtn = document.getElementById('confirm-cancel-btn');
        const confirmOkBtn = document.getElementById('confirm-ok-btn');

        const openConfirm = ({ title, message, okText = '確認', cancelText = '取消' }) => {
            confirmTitleEl.innerText = title || '確認動作';
            confirmMessageEl.innerText = message || '確定要執行嗎？';
            confirmOkBtn.innerText = okText;
            confirmCancelBtn.innerText = cancelText;
            confirmModalEl.style.display = 'flex';
            return new Promise((resolve) => {
                confirmResolver = resolve;
            });
        };

        const closeConfirm = (result) => {
            confirmModalEl.style.display = 'none';
            const r = confirmResolver;
            confirmResolver = null;
            if (r) r(Boolean(result));
        };

        confirmCancelBtn.addEventListener('click', () => closeConfirm(false));
        confirmOkBtn.addEventListener('click', () => closeConfirm(true));
        confirmModalEl.addEventListener('click', (e) => {
            if (e.target === confirmModalEl) closeConfirm(false);
        });

        const openSettingsModal = () => {
            settingsModal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
            const activeBtn = settingsTabsEl.querySelector('button[data-tab].bg-black');
            const tab = activeBtn?.getAttribute('data-tab') ?? '帳號';
            setSettingsTab(tab);
        };

        const closeSettingsModal = () => {
            settingsModal.style.display = 'none';
            document.body.style.overflow = '';
            unmountAccountsTab();
            unmountCategoriesTab();
        };

        const escapeHtml = (value) => {
            return String(value ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        };

        const bytesToBase64 = (bytes) => {
            let binary = '';
            const chunkSize = 0x8000;
            for (let i = 0; i < bytes.length; i += chunkSize) {
                binary += String.fromCharCode(...bytes.subarray(i, i + chunkSize));
            }
            return btoa(binary);
        };

        const sha256Base64 = async (text) => {
            const data = new TextEncoder().encode(text);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            return bytesToBase64(new Uint8Array(hashBuffer));
        };

        const generateSaltBase64 = () => {
            const bytes = crypto.getRandomValues(new Uint8Array(16));
            return bytesToBase64(bytes);
        };

        let accountsUnsub = null;
        let accountsCache = [];
        let accountEditorMode = 'create';
        let editingAccountId = null;
        let seededDefaultAccount = false;
        let accountsPermissionDenied = false;
        let categoriesUnsub = null;
        let categoriesCache = [];
        let categoryEditorMode = 'create';
        let editingCategoryId = null;
        let seededDefaultCategories = false;
        let productsTabCache = null;

        const renderPlaceholder = (tab) => {
            settingsContentEl.innerHTML = `<div class="text-sm text-gray-700 mt-2 leading-relaxed">此功能尚未建置。</div>`;
        };

        const renderProductsTab = () => {
            if (!Array.isArray(productsTabCache)) {
                productsTabCache = (typeof PRODUCTS !== 'undefined' ? PRODUCTS : []).map(p => ({ ...p }));
            }

            const renderRows = () => {
                const rows = productsTabCache.map((p) => {
                    const id = escapeHtml(p.id);
                    const brand = escapeHtml(p.brand ?? '-');
                    const category = escapeHtml(p.category ?? '-');
                    const name = escapeHtml(p.name ?? '');
                    const price = Number(p.price ?? 0);
                    const cost = p.costPrice != null ? Number(p.costPrice) : null;
                    const emoji = escapeHtml(p.emoji ?? '');
                    const imageUrl = p.imageDataUrl ? escapeHtml(p.imageDataUrl) : (p.imageUrl ? escapeHtml(p.imageUrl) : '');
                    const bgColor = escapeHtml(p.bgColor ?? '#f3f4f6');

                    const imageHtml = imageUrl
                        ? `<img src="${imageUrl}" alt="${name}" class="w-10 h-10 rounded-2xl object-cover">`
                        : `<div class="w-10 h-10 rounded-2xl" style="background:${bgColor}; display:flex; align-items:center; justify-content:center;"><span class="text-2xl">${emoji || '🧾'}</span></div>`;

                    const colorSwatch = `
                        <div class="flex items-center gap-2">
                            <span class="inline-block w-5 h-5 rounded-full border border-gray-200" style="background:${bgColor};"></span>
                            <span class="text-xs text-gray-600">${bgColor}</span>
                        </div>
                    `;

                    return `
                        <tr class="hover:bg-gray-50">
                            <td class="px-4 py-3 text-gray-700">${id}</td>
                            <td class="px-4 py-3 text-gray-900 font-bold">${brand}</td>
                            <td class="px-4 py-3 font-bold text-gray-900">${category}</td>
                            <td class="px-4 py-3">${imageHtml}</td>
                            <td class="px-4 py-3 text-gray-900">${name}</td>
                            <td class="px-4 py-3 font-bold text-gray-900">$ ${escapeHtml(price)}</td>
                            <td class="px-4 py-3 text-gray-900">${cost != null ? `$ ${escapeHtml(cost)}` : '-'}</td>
                            <td class="px-4 py-3">${colorSwatch}</td>
                            <td class="px-4 py-3">
                                <div class="flex items-center gap-2">
                                    <button data-action="edit" data-id="${p.id}" class="px-3 py-1.5 rounded-xl font-bold text-xs bg-black text-white hover:bg-gray-900 transition-colors">編輯</button>
                                    <button data-action="delete" data-id="${p.id}" class="px-3 py-1.5 rounded-xl font-bold text-xs border border-gray-200 bg-white text-gray-900 hover:bg-gray-50 transition-colors">刪除</button>
                                </div>
                            </td>
                        </tr>
                    `;
                }).join('');

                const tbody = document.getElementById('products-tbody');
                if (tbody) {
                    tbody.innerHTML = rows || `
                        <tr>
                            <td colspan="9" class="px-4 py-10 text-center text-gray-500">目前沒有商品資料。</td>
                        </tr>
                    `;
                }
            };

            settingsContentEl.innerHTML = `
                <div class="mt-4 space-y-4">
                    <div class="text-sm text-gray-600">目前商品清單（自動從前台商品資料產生）</div>
                    <div class="rounded-3xl border border-gray-200 bg-white overflow-hidden">
                        <div class="overflow-auto">
                            <table class="min-w-[1100px] w-full text-sm">
                                <thead class="bg-gray-50 text-gray-600">
                                    <tr>
                                        <th class="text-left font-bold px-4 py-3">編號</th>
                                        <th class="text-left font-bold px-4 py-3">品牌</th>
                                        <th class="text-left font-bold px-4 py-3">類別</th>
                                        <th class="text-left font-bold px-4 py-3">圖片</th>
                                        <th class="text-left font-bold px-4 py-3">名稱</th>
                                        <th class="text-left font-bold px-4 py-3">售價</th>
                                        <th class="text-left font-bold px-4 py-3">成本價</th>
                                        <th class="text-left font-bold px-4 py-3">底色</th>
                                        <th class="text-left font-bold px-4 py-3">操作</th>
                                    </tr>
                                </thead>
                                <tbody id="products-tbody" class="divide-y divide-gray-100"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;

            const container = document.getElementById('settings-content');
            const tbody = document.getElementById('products-tbody');
            if (tbody) {
                tbody.addEventListener('click', async (e) => {
                    const editBtn = e.target.closest('[data-action="edit"]');
                    const deleteBtn = e.target.closest('[data-action="delete"]');
                    if (!editBtn && !deleteBtn) return;
                    const id = (editBtn ?? deleteBtn).getAttribute('data-id');
                    if (editBtn) {
                        alert('商品編輯尚未建置。');
                        return;
                    }
                    const ok = await openConfirm({ title: '確認刪除', message: `確定要刪除此商品（編號：${id}）嗎？`, okText: '確認', cancelText: '取消' });
                    if (!ok) return;
                    productsTabCache = productsTabCache.filter(p => String(p.id) !== String(id));
                    renderRows();
                });
            }

            renderRows();
        };

        const getProductCategoryCounts = () => {
            const list = (typeof PRODUCTS !== 'undefined' ? PRODUCTS : []);
            const counts = new Map();
            list.forEach((p) => {
                const key = String(p.category ?? '').trim();
                if (!key) return;
                counts.set(key, (counts.get(key) ?? 0) + 1);
            });
            return counts;
        };

        const renderCategoriesTab = () => {
            settingsContentEl.innerHTML = `
                <div class="mt-4 space-y-4">
                    <div class="flex items-center justify-between gap-3">
                        <div class="text-sm text-gray-600">管理產品類別</div>
                        <button id="category-add-btn" class="px-4 py-2 rounded-2xl font-bold bg-black text-white hover:bg-gray-900 transition-colors">
                            新增類別
                        </button>
                    </div>

                    <div id="categories-notice" class="hidden text-sm bg-gray-50 border border-gray-200 text-gray-900 rounded-2xl p-4"></div>

                    <div class="rounded-3xl border border-gray-200 bg-white overflow-hidden">
                        <div class="overflow-auto">
                            <table class="min-w-[720px] w-full text-sm">
                                <thead class="bg-gray-50 text-gray-600 sticky top-0 z-10">
                                    <tr>
                                        <th class="text-left font-bold px-4 py-3">類別</th>
                                        <th class="text-left font-bold px-4 py-3">商品數量</th>
                                        <th class="text-left font-bold px-4 py-3">操作</th>
                                    </tr>
                                </thead>
                                <tbody id="categories-tbody" class="divide-y divide-gray-100"></tbody>
                            </table>
                        </div>
                    </div>

                    <div id="category-editor-modal" class="fixed inset-0 hidden items-center justify-center bg-black/60 backdrop-blur-sm z-[60] p-4">
                        <div class="w-full max-w-lg bg-white rounded-3xl shadow-2xl overflow-hidden">
                            <div class="bg-black text-white px-6 py-4 flex items-center justify-between">
                                <div id="category-editor-title" class="font-black tracking-wider">新增類別</div>
                                <button id="category-editor-close" class="px-3 py-1 rounded-full border border-white/20 hover:bg-white/10 transition-colors text-sm">關閉</button>
                            </div>
                            <form id="category-editor-form" class="p-6 space-y-4">
                                <div>
                                    <label class="block text-sm font-bold text-gray-700 mb-1" for="category-name">類別名稱</label>
                                    <input id="category-name" type="text" required class="w-full px-4 py-3 rounded-2xl border border-gray-200 focus:ring-2 focus:ring-gray-900 outline-none transition-all">
                                </div>

                                <div id="category-editor-error" class="hidden text-sm bg-gray-50 border border-gray-200 text-gray-900 rounded-2xl p-4"></div>

                                <div class="flex items-center justify-end gap-3 pt-2">
                                    <button id="category-editor-cancel" type="button" class="px-4 py-3 rounded-2xl font-bold border border-gray-200 bg-white text-gray-900 hover:bg-gray-50 transition-colors">
                                        取消
                                    </button>
                                    <button id="category-editor-submit" type="submit" class="px-5 py-3 rounded-2xl font-bold bg-black text-white hover:bg-gray-900 transition-colors">
                                        儲存
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            `;

            const addBtn = document.getElementById('category-add-btn');
            const noticeEl = document.getElementById('categories-notice');
            const tbody = document.getElementById('categories-tbody');
            const editorModal = document.getElementById('category-editor-modal');
            const editorTitle = document.getElementById('category-editor-title');
            const editorClose = document.getElementById('category-editor-close');
            const editorCancel = document.getElementById('category-editor-cancel');

                avatarFallbackEl.classList.remove('hidden');
            };

            const resizeImageToDataUrl = async (file) => {
                const maxSize = 256;
                const url = URL.createObjectURL(file);
                try {
                    const img = await new Promise((resolve, reject) => {
                        const el = new Image();
                        el.onload = () => resolve(el);
                        el.onerror = () => reject(new Error('讀取圖片失敗'));
                        el.src = url;
                    });

                    const scale = Math.min(1, maxSize / Math.max(img.naturalWidth || img.width, img.naturalHeight || img.height));
                    const targetW = Math.max(1, Math.round((img.naturalWidth || img.width) * scale));
                    const targetH = Math.max(1, Math.round((img.naturalHeight || img.height) * scale));

                    const canvas = document.createElement('canvas');
                    canvas.width = targetW;
                    canvas.height = targetH;
                    const ctx = canvas.getContext('2d');
                    if (!ctx) throw new Error('瀏覽器不支援圖片處理');
                    ctx.drawImage(img, 0, 0, targetW, targetH);

                    try {
                        return canvas.toDataURL('image/webp', 0.85);
                    } catch {
                        return canvas.toDataURL('image/jpeg', 0.85);
                    }
                } finally {
                    URL.revokeObjectURL(url);
                }
            };

                if (!ok) return;
                await deleteDoc(doc(db, 'accounts', id));

                        : `
                            <div class="flex items-center gap-2">
                                <button data-action="edit" data-id="${a.id}" class="px-3 py-1.5 rounded-xl font-bold text-xs bg-black text-white hover:bg-gray-900 transition-colors">編輯</button>
                                <button data-action="delete" data-id="${a.id}" class="px-3 py-1.5 rounded-xl font-bold text-xs border border-gray-200 bg-white text-gray-900 hover:bg-gray-50 transition-colors">刪除</button>
                            </div>
                        `;

                    return `
                        <tr class="hover:bg-gray-50">
                            <td class="px-4 py-3">
                                <div class="w-9 h-9 rounded-full bg-gray-200 text-gray-900 font-black flex items-center justify-center overflow-hidden">
                                    ${avatarHtml}
                                    <span data-fallback class="${avatarUrl ? 'hidden' : ''}">${initial}</span>
                                </div>
                            </td>
                            <td class="px-4 py-3 font-bold text-gray-900">${name}</td>
                            <td class="px-4 py-3 text-gray-700">${email}</td>
                            <td class="px-4 py-3 text-gray-700">${phone || '-'}</td>
                            <td class="px-4 py-3">
                                <span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-bold bg-gray-100 text-gray-900 border border-gray-200">${role || '-'}</span>
                            </td>
                            <td class="px-4 py-3 font-mono text-gray-700">${passwordLabel}</td>
                            <td class="px-4 py-3">
                                ${actionsHtml}
                            </td>
                        </tr>
                    `;
                }).join('');

                tbody.innerHTML = rows || `
                    <tr>
                        <td colspan="7" class="px-4 py-10 text-center text-gray-500">尚無帳號資料，請先新增。</td>
                    </tr>
                `;
            };

            renderAccountsRows();

            if (!accountsUnsub) {
                accountsUnsub = onSnapshot(
                    collection(db, 'accounts'),
                    async (snapshot) => {
                        accountsPermissionDenied = false;
                        noticeEl.classList.add('hidden');
                        noticeEl.innerText = '';
                        addBtn.disabled = false;
                        addBtn.className = 'px-4 py-2 rounded-2xl font-bold bg-black text-white hover:bg-gray-900 transition-colors';
                        accountsCache = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));

                        if (accountsCache.length === 0 && currentUser?.uid && currentUser?.email && !seededDefaultAccount) {
                            seededDefaultAccount = true;
                            const emailPrefix = String(currentUser.email).split('@')[0] || '使用者';
                            const payload = {
                                name: currentUser.displayName ?? emailPrefix,
                                role: '系統管理員',
                                email: currentUser.email,
                                phone: '',
                                avatarUrl: currentUser.photoURL ?? null,
                                authUid: currentUser.uid,
                                createdAt: serverTimestamp(),
                                updatedAt: serverTimestamp()
                            };

                            accountsCache = [{ id: currentUser.uid, ...payload }];
                            renderAccountsRows();

                            try {
                                await setDoc(doc(db, 'accounts', currentUser.uid), payload, { merge: true });
                            } catch (err) {
                                seededDefaultAccount = false;
                            }
                        }

                        renderAccountsRows();
                    },
                    (error) => {
                        if (error?.code === 'permission-denied') {
                            accountsPermissionDenied = true;
                            addBtn.disabled = true;
                            addBtn.className = 'px-4 py-2 rounded-2xl font-bold bg-gray-300 text-gray-700 cursor-not-allowed';
                            noticeEl.classList.remove('hidden');
                            noticeEl.innerText = '目前帳號資料權限不足，已先改為僅顯示目前登入者；如需完整帳號管理（新增/編輯/刪除），請到 Firebase Console 調整 Firestore Rules 允許登入者讀寫 accounts。';
                            const emailPrefix = String(currentUser?.email ?? '').split('@')[0] || '使用者';
                            accountsCache = [{
                                id: currentUser?.uid ?? 'current-user',
                                name: currentUser?.displayName ?? emailPrefix,
                                role: '系統管理員',
                                email: currentUser?.email ?? '',
                                phone: '',
                                avatarUrl: currentUser?.photoURL ?? null,
                                authUid: currentUser?.uid ?? null,
                                passwordHash: null,
                                _readonly: true
                            }];
                            renderAccountsRows();
                            return;
                        }

                        accountsCache = [];
                        noticeEl.classList.remove('hidden');
                        noticeEl.innerText = `無法讀取帳號資料：${escapeHtml(error?.code ?? error?.message ?? 'unknown error')}`;
                        renderAccountsRows();
                    }
                );
            }
        };

        const unmountAccountsTab = () => {
            if (accountsUnsub) {
                accountsUnsub();
                accountsUnsub = null;
            }
        };

        const unmountCategoriesTab = () => {
            if (categoriesUnsub) {
                categoriesUnsub();
                categoriesUnsub = null;
            }
        };

        const setSettingsTab = (tab) => {
            const buttons = settingsTabsEl.querySelectorAll('button[data-tab]');
            buttons.forEach((btn) => {
                const active = btn.getAttribute('data-tab') === tab;
                btn.className = active
                    ? 'px-4 py-3 rounded-2xl font-bold border border-gray-200 bg-black text-white'
                    : 'px-4 py-3 rounded-2xl font-bold border border-gray-200 bg-white text-gray-900 hover:bg-gray-50';
            });
            settingsContentTitleEl.innerText = tab;
            if (tab === '帳號') {
                unmountCategoriesTab();
                renderAccountsTab();
                return;
            }
            if (tab === '商品') {
                unmountAccountsTab();
                unmountCategoriesTab();
                renderProductsTab();
                return;
            }
            if (tab === '類別') {
                unmountAccountsTab();
                renderCategoriesTab();
                return;
            }
            unmountAccountsTab();
            unmountCategoriesTab();
            renderPlaceholder(tab);
        };

        settingsBtn.addEventListener('click', openSettingsModal);
        settingsCloseBtn.addEventListener('click', closeSettingsModal);
        settingsModal.addEventListener('click', (e) => {
            if (e.target === settingsModal) closeSettingsModal();
        });
        settingsTabsEl.addEventListener('click', (e) => {
            const btn = e.target.closest('button[data-tab]');
            if (!btn) return;
            setSettingsTab(btn.getAttribute('data-tab'));
        });
        document.addEventListener('keydown', (e) => {
            if (e.key !== 'Escape') return;
            if (confirmModalEl.style.display === 'flex') {
                closeConfirm(false);
                return;
            }
            if (settingsModal.style.display === 'flex') closeSettingsModal();
        });

        // 3. 資料與狀態管理
        const PRODUCTS = [
            { id: 1, name: '經典牛肉漢堡', price: 150, category: '主食', emoji: '🍔' },
            { id: 2, name: '紅醬義大利麵', price: 180, category: '主食', emoji: '🍝' },
            { id: 3, name: '瑪格麗特披薩', price: 220, category: '主食', emoji: '🍕' },
            { id: 4, name: '冰美式咖啡', price: 80, category: '飲品', emoji: '☕' },
            { id: 5, name: '鮮奶茶', price: 95, category: '飲品', emoji: '🥤' },
            { id: 6, name: '焦糖布丁', price: 70, category: '甜點', emoji: '🍮' },
            { id: 7, name: '酥炸洋蔥圈', price: 65, category: '炸物', emoji: '🧅' },
            { id: 8, name: '黃金脆薯', price: 60, category: '炸物', emoji: '🍟' },
        ];

        let cart = [];
        let currentCategory = '全部';
        let searchQuery = '';

        // 4. 渲染函式
        function renderCategories() {
            const cats = ['全部', ...new Set(PRODUCTS.map(p => p.category))];
            const container = document.getElementById('category-list');
            container.innerHTML = cats.map(cat => `
                <button onclick="setCategory('${cat}')" 
                    class="px-5 py-2.5 rounded-full text-base font-bold transition-all whitespace-nowrap
                    ${currentCategory === cat ? 'bg-black text-white shadow-md' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}">
                    ${cat}
                </button>
            `).join('');
        }

        function renderProducts() {
            const container = document.getElementById('product-grid');
            const filtered = PRODUCTS.filter(p => {
                const matchCat = currentCategory === '全部' || p.category === currentCategory;
                const matchSearch = p.name.includes(searchQuery);
                return matchCat && matchSearch;
            });

            container.innerHTML = filtered.map(p => `
                <div onclick="addToCart(${p.id})" class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm hover:border-gray-300 hover:shadow-md cursor-pointer transition-all active:scale-95 flex flex-col items-center text-center group">
                    <span class="w-20 aspect-square text-6xl flex items-center justify-center mb-2 group-hover:scale-110 transition-transform">${p.emoji}</span>
                    <span class="font-bold text-sm h-10 overflow-hidden line-clamp-2">${p.name}</span>
                    <span class="text-gray-900 font-black mt-2 text-xl">$ ${p.price}</span>
                </div>
            `).join('');
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-gray-300 space-y-2 py-10">
                        <span class="text-6xl">🛒</span>
                        <p>購物車空空的</p>
                    </div>
                `;
                document.getElementById('checkout-btn').disabled = true;
            } else {
                container.innerHTML = cart.map(item => `
                    <div class="flex items-center justify-between bg-white p-3 rounded-xl shadow-sm border border-gray-50">
                        <div class="flex-1 min-w-0">
                            <div class="font-bold text-sm truncate">${item.name}</div>
                            <div class="text-gray-900 text-xs font-bold">$ ${item.price}</div>
                        </div>
                        <div class="flex items-center space-x-2">
                            <button onclick="updateQty(${item.id}, -1)" class="w-7 h-7 flex items-center justify-center bg-gray-100 rounded-lg hover:bg-gray-200 hover:text-gray-900 font-bold">-</button>
                            <span class="w-6 text-center text-sm font-bold">${item.quantity}</span>
                            <button onclick="updateQty(${item.id}, 1)" class="w-7 h-7 flex items-center justify-center bg-gray-100 rounded-lg hover:bg-gray-200 hover:text-gray-900 font-bold">+</button>
                        </div>
                    </div>
                `).join('');
                document.getElementById('checkout-btn').disabled = false;
            }

            const subtotal = cart.reduce((s, i) => s + i.price * i.quantity, 0);
            const tax = Math.round(subtotal * 0.05);
            const total = subtotal + tax;

            document.getElementById('subtotal-display').innerText = `$ ${subtotal}`;
            document.getElementById('tax-display').innerText = `$ ${tax}`;
            document.getElementById('total-display').innerText = `$ ${total}`;
            return { subtotal, tax, total };
        }

        // 5. 互動邏輯 (掛載到 window 供 HTML 呼叫)
        window.setCategory = (cat) => { currentCategory = cat; renderCategories(); renderProducts(); };
        window.addToCart = (id) => {
            const p = PRODUCTS.find(x => x.id === id);
            const exist = cart.find(x => x.id === id);
            if (exist) exist.quantity++;
            else cart.push({ ...p, quantity: 1 });
            renderCart();
        };
        window.updateQty = (id, delta) => {
            const item = cart.find(x => x.id === id);
            item.quantity += delta;
            if (item.quantity <= 0) cart = cart.filter(x => x.id !== id);
            renderCart();
        };
        window.clearCart = () => { cart = []; renderCart(); };

        window.handleCheckout = async () => {
            if (!currentUser) {
                alert("尚未登入，請先登入。");
                return;
            }

            const { subtotal, tax, total } = renderCart();
            const btn = document.getElementById('checkout-btn');
            btn.innerText = "正在儲存至雲端...";
            btn.disabled = true;

            try {
                const orderData = {
                    items: cart.map(i => ({ name: i.name, price: i.price, qty: i.quantity })),
                    subtotal,
                    tax,
                    total,
                    createdAt: serverTimestamp(),
                    userId: currentUser.uid,
                    userEmail: currentUser.email ?? null
                };

                await addDoc(collection(db, 'orders'), orderData);

                // 顯示成功 Modal
                const receiptHtml = cart.map(i => `
                    <div class="flex justify-between">
                        <span>${i.name} x ${i.quantity}</span>
                        <span>$ ${i.price * i.quantity}</span>
                    </div>
                `).join('') + `<div class="receipt-dashed mt-2 pt-2 flex justify-between font-bold text-gray-900"><span>實收</span><span>$ ${total}</span></div>`;
                
                document.getElementById('receipt-content').innerHTML = receiptHtml;
                document.getElementById('success-modal').style.display = 'flex';
                
            } catch (err) {
                console.error("儲存失敗", err);
                alert("雲端儲存失敗，請檢查網路連線。");
            } finally {
                btn.innerText = "確認結帳並上傳雲端";
                btn.disabled = false;
            }
        };

        window.closeModal = () => {
            document.getElementById('success-modal').style.display = 'none';
            window.clearCart();
        };

        document.getElementById('search-input').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderProducts();
        });

        // 初始化渲染
        renderCategories();
        renderProducts();
        renderCart();

    </script>
</body>
</html>
